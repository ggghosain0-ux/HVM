<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance - {{ panel_name }}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans antialiased bg-[#030712] min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <!-- Ambient Radial Glow Nodes -->
    <div class="absolute -left-48 -bottom-48 w-96 h-96 rounded-full bg-indigo-500/5 blur-3xl pointer-events-none"></div>
    <div class="absolute -right-48 -top-48 w-96 h-96 rounded-full bg-indigo-500/5 blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-md relative z-10 animate-[fadeIn_0.5s_ease-out]">
        <div class="bg-slate-900/40 border border-white/5 rounded-3xl p-8 text-center shadow-2xl relative overflow-hidden backdrop-blur-md">
            
            <!-- Spinning gear/tools icon visualizer -->
            <div class="relative w-24 h-24 mx-auto mb-6 flex items-center justify-center">
                <!-- Outer glowing circle -->
                <div class="absolute inset-0 rounded-full bg-indigo-500/10 border border-indigo-500/20 animate-[pulse_3s_infinite]"></div>
                <!-- Main gear icon -->
                <i class="fas fa-cog text-4xl text-indigo-400 animate-[spin_8s_linear_infinite]"></i>
                <!-- Small secondary gear -->
                <i class="fas fa-cog text-xl text-indigo-500/70 absolute top-5 right-5 animate-[spin_4s_linear_infinite_reverse]"></i>
            </div>

            <div class="space-y-2 mb-6">
                <h1 class="text-xl font-bold font-display text-white tracking-tight">System Maintenance</h1>
                <p class="text-xs text-slate-400 leading-relaxed font-medium">
                    {{ message or "The management node is currently performing database indexing and cluster synchronization tasks. We will restore access to hypervisor controls shortly." }}
                </p>
            </div>

            <!-- Sleek animated infinite progress bar -->
            <div class="w-full h-1.5 rounded-full bg-slate-950 border border-white/5 overflow-hidden mb-6 relative">
                <div class="absolute inset-y-0 h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full w-1/3 animate-[shimmer_2s_infinite_linear]" style="left: -33%;"></div>
            </div>

            <!-- Relative status badge -->
            <span class="inline-flex items-center gap-1.5 px-3.5 py-1.5 bg-indigo-500/10 border border-indigo-500/15 rounded-full text-[10px] font-bold text-indigo-400 font-display">
                <i class="fas fa-clock text-[9px] animate-pulse"></i>
                <span>Estimated completion: 15-30 minutes</span>
            </span>

        </div>
    </div>

    <style>
        @keyframes shimmer {
            0% { left: -33%; }
            100% { left: 100%; }
        }
    </style>
</body>
</html>
