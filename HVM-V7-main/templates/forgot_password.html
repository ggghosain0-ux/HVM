{% extends "base.html" %}

{% block title %}Forgot Password - {{ panel_name }}{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[75vh] px-4 py-8">
    <div class="w-full max-w-md rounded-2xl glass-panel p-6 md:p-8 shadow-2xl relative border border-white/10 overflow-hidden">
        
        <!-- Subtle gradient border highlights -->
        <div class="absolute top-0 inset-x-0 h-[2px] bg-gradient-to-r from-transparent via-indigo-500/50 to-transparent"></div>

        <!-- Header area -->
        <div class="text-center mb-8">
            <div class="w-14 h-14 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-key text-xl"></i>
            </div>
            <h2 class="font-display font-bold text-2xl text-white tracking-tight">Recover Password</h2>
            <p class="text-xs text-slate-400 mt-1">Enter your registered email address and we'll dispatch a secure recovery link.</p>
        </div>

        <!-- Form recovery -->
        <form method="POST" action="{{ url_for('forgot_password') }}" class="space-y-5">
            <div class="space-y-1.5">
                <label class="text-xs font-bold uppercase tracking-wider text-slate-400 font-display">Email Address</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                    <input type="email" name="email" placeholder="you@example.com" required autofocus class="w-full pl-9 pr-4 py-2.5 rounded-xl border border-white/5 bg-slate-900/60 text-slate-200 text-sm focus:outline-none focus:border-indigo-500/50 transition font-sans">
                </div>
            </div>
            
            <button type="submit" class="w-full flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-sm shadow-lg shadow-indigo-600/20 transition hover:-translate-y-0.5 cursor-pointer">
                <i class="fas fa-paper-plane"></i>
                <span>Send Reset Token</span>
            </button>
            
            <div class="text-center pt-2">
                <a href="{{ url_for('login') }}" class="text-xs text-slate-400 hover:text-white transition font-medium">
                    <i class="fas fa-arrow-left mr-1.5 text-[10px]"></i>
                    Return to Login
                </a>
            </div>
        </form>

        <!-- Information notification -->
        <div class="mt-6 pt-5 border-t border-white/5 text-center flex items-center justify-center gap-2 text-[10px] text-slate-500 font-medium">
            <i class="fas fa-clock text-amber-500/70"></i>
            <span>Sent token links remain valid for 60 minutes only.</span>
        </div>
    </div>
</div>
{% endblock %}
